name: release

# Triggered by pushing a tag like v0.1.0. Two phases:
#   1. `build` (matrix) - one runner per platform: bundles, signs, notarizes,
#      then uploads its artifacts to a per-platform Actions artifact.
#   2. `publish` (single runner) - downloads every Actions artifact, builds
#      latest.json from the .sig files, then creates the GitHub Release with
#      every asset in one shot. No parallel writes to the same release means
#      no `Error updating policy` race like v0.1.5.
#
# Code signing notes:
#  - macOS: set the secrets APPLE_CERTIFICATE (base64), APPLE_CERTIFICATE_PASSWORD,
#    APPLE_SIGNING_IDENTITY, APPLE_ID, APPLE_PASSWORD (app-specific), APPLE_TEAM_ID
#    in repo settings. Until you add them, the macOS build is unsigned.
#  - Windows: optional WINDOWS_CERTIFICATE (base64) + WINDOWS_CERTIFICATE_PASSWORD
#    secrets enable signtool.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            artifact_name: 'macos-aarch64'
            arch_suffix: 'aarch64'
          - platform: 'ubuntu-22.04'
            args: ''
            artifact_name: 'linux-x86_64'
            arch_suffix: ''
          - platform: 'windows-latest'
            args: ''
            artifact_name: 'windows-x86_64'
            arch_suffix: ''
          # macOS Intel (x86_64) dropped in v0.1.18: Apple Silicon launched
          # in 2020, no Intel macs sold since, and Apple's notarization
          # queue routinely stalled the Intel build for 40+ min while ARM,
          # Linux, and Windows all finished in 8-12 min. Not worth the wait.
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Cache cargo target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.platform }}-${{ matrix.args }}

      - name: Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: npm install
        run: npm ci

      - name: Build (Tauri)
        id: tauri
        # macOS bundles use AD-HOC signing (codesign --sign -) instead of
        # Developer ID. v0.1.19 dropped Apple notarization but the builds
        # still hung 20+ min on Developer ID codesign because codesign
        # makes network calls to Apple's CRL/OCSP/timestamp servers, which
        # stall identically to the notarization queue. Ad-hoc signing
        # contacts no Apple servers - just a hash-only signature. Updater
        # verification is independent of macOS codesign (minisign) so the
        # auto-update flow is unchanged. UX trade is identical to v0.1.19:
        # first-launch right-click → Open, then Gatekeeper remembers.
        # tauri.conf.json already has signingIdentity = "-" (ad-hoc); we
        # just stop overriding it via APPLE_SIGNING_IDENTITY env var.
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        uses: tauri-apps/tauri-action@v0
        with:
          # No tagName - skip release upload entirely so we don't race with
          # the other matrix jobs. The publish job collects artifacts and
          # creates the release in one shot.
          args: ${{ matrix.args }}

      - name: Stage artifacts
        shell: bash
        run: |
          python3 .github/scripts/stage-artifacts.py \
            '${{ steps.tauri.outputs.artifactPaths }}' \
            '${{ matrix.arch_suffix }}' \
            staging

      - uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.artifact_name }}
          path: staging/*
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: bundle-*
          merge-multiple: true

      - name: List staged assets
        run: ls -la dist

      - name: Build latest.json
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          python3 .github/scripts/build-latest-json.py dist > dist/latest.json
          cat dist/latest.json

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "Yunomia ${GITHUB_REF_NAME}" \
            --notes "See [README](https://github.com/${GITHUB_REPOSITORY}/blob/main/README.md) for install instructions.
          In-app update users will be prompted automatically on next launch." \
            dist/*
